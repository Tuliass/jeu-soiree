<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Situation</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="app-header">
    <button id="back-home">⬅</button>
    <h1 id="player-name"></h1>
    <button id="open-groups">👥</button>
  </header>

  <p id="situation-description"></p>

  <div id="solutions-container"></div>

  <button id="confirm-solution" disabled>Confirmer</button>

  <div id="groups-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Groupes</h2>
        <button class="square-button" id="close-groups">✖</button>
      </div>
  
      <div id="groups-container"></div>
    </div>
  </div>
  

  <script src="js/state.js"></script>
  <script src="js/situation.js"></script>
  
</body>
</html>
